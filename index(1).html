<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Er Det Blanc Vejr?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    transition: background 1.5s ease, color 1.5s ease;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
    background: #0A1628;
    color: #FFFDF5;
  }

  /* ===== PARTY MODE ===== */
  body.party { background: #0A1628; color: #FFFDF5; }

  /* ===== SAD MODE ===== */
  body.sad { background: #111; color: #555; }

  /* Backgrounds */
  .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }

  .bg-party {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255, 200, 0, 0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(255, 120, 0, 0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(10, 22, 40, 1) 0%, #0A1628 100%);
    animation: bgPulse 3s ease-in-out infinite alternate;
    opacity: 0; transition: opacity 1.5s ease;
  }
  body.party .bg-party { opacity: 1; }

  .bg-sad {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(40, 40, 50, 0.4) 0%, transparent 60%),
      linear-gradient(180deg, #111 0%, #0a0a0a 100%);
    opacity: 0; transition: opacity 1.5s ease;
  }
  body.sad .bg-sad { opacity: 1; }

  @keyframes bgPulse {
    0% { filter: hue-rotate(0deg) brightness(1); }
    100% { filter: hue-rotate(15deg) brightness(1.15); }
  }

  /* ===== BUBBLES ===== */
  .bubbles { position: fixed; inset: 0; z-index: 0; pointer-events: none; transition: opacity 1s ease; }
  body.sad .bubbles { opacity: 0.05; }
  body.party .bubbles { opacity: 1; }

  .bubble {
    position: absolute; bottom: -20px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255, 248, 231, 0.18), rgba(212, 168, 67, 0.06));
    border: 1px solid rgba(255, 255, 255, 0.07);
    animation: rise linear infinite;
  }

  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
  }

  /* ===== RAIN ===== */
  .rain { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0; transition: opacity 1.5s ease; }
  body.sad .rain { opacity: 1; }

  .raindrop {
    position: absolute; top: -20px; width: 1.5px;
    background: linear-gradient(transparent, rgba(80, 100, 130, 0.5));
    border-radius: 0 0 2px 2px;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-20px); opacity: 0; }
    10% { opacity: 0.7; }
    100% { transform: translateY(110vh); opacity: 0; }
  }

  /* ===== CONFETTI ===== */
  .confetti-container { position: fixed; inset: 0; z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; }
  body.party .confetti-container { opacity: 1; }

  .confetti {
    position: absolute; top: -20px;
    animation: confettiFall linear infinite;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
    50% { opacity: 0.9; }
    100% { transform: translateY(110vh) rotate(1080deg) scale(0.5); opacity: 0; }
  }

  /* ===== FLOATING EMOJIS ===== */
  .emoji-float {
    position: fixed; font-size: 2rem; z-index: 5; pointer-events: none;
    animation: emojiRise 4s ease-out forwards; opacity: 0;
  }
  body.sad .emoji-float { display: none; }

  @keyframes emojiRise {
    0% { transform: translateY(0) scale(0.5) rotate(-10deg); opacity: 0; }
    15% { opacity: 1; transform: scale(1); }
    85% { opacity: 0.7; }
    100% { transform: translateY(-350px) scale(1.3) rotate(15deg); opacity: 0; }
  }

  /* ===== MAIN CONTENT ===== */
  .container {
    position: relative; z-index: 2; text-align: center;
    padding: 2rem; max-width: 600px; width: 100%;
  }

  .question {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1.1;
    margin-bottom: 0.3em; animation: fadeDown 1s ease-out 0.4s both;
    transition: color 1s ease, text-shadow 1s ease;
  }
  .question em { font-style: italic; transition: color 1s ease; }

  body.party .question { color: #FFFDF5; text-shadow: 0 0 40px rgba(255, 200, 0, 0.2); }
  body.party .question em { color: #FFD700; }
  body.sad .question { color: #333; text-shadow: none; }
  body.sad .question em { color: #444; }

  /* Beer image */
  .beer-icon {
    display: block; margin: 1.2rem auto; height: 180px; width: auto;
    object-fit: contain; animation: fadeDown 1s ease-out 0.6s both;
    transition: filter 1.5s ease;
  }

  body.party .beer-icon {
    filter: drop-shadow(0 0 35px rgba(255, 215, 0, 0.5)) drop-shadow(0 0 70px rgba(255, 165, 0, 0.25));
    animation: fadeDown 1s ease-out 0.6s both, beerWobble 2.5s ease-in-out 2s infinite;
  }

  body.sad .beer-icon {
    filter: grayscale(1) brightness(0.3) drop-shadow(0 5px 15px rgba(0, 0, 0, 0.8));
    animation: fadeDown 1s ease-out 0.6s both, beerDroop 4s ease-in-out 2s infinite;
  }

  @keyframes beerWobble {
    0%, 100% { transform: rotate(-4deg) translateY(0); }
    25% { transform: rotate(4deg) translateY(-5px); }
    50% { transform: rotate(-2deg) translateY(0); }
    75% { transform: rotate(3deg) translateY(-3px); }
  }

  @keyframes beerDroop {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    50% { transform: rotate(8deg) translateY(5px); }
  }

  /* Answer */
  .answer-wrapper { margin: 1.5rem 0; animation: fadeDown 1s ease-out 0.8s both; position: relative; }

  .answer {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: clamp(5rem, 20vw, 12rem); line-height: 1;
    transition: color 0.8s ease, text-shadow 0.8s ease;
  }

  .answer.yes {
    color: #FFD700;
    text-shadow: 0 0 60px rgba(255, 215, 0, 0.7), 0 0 120px rgba(255, 165, 0, 0.4), 0 0 200px rgba(255, 200, 0, 0.2);
    animation: partyPulse 1.5s ease-in-out infinite, partyColor 6s ease-in-out infinite;
  }

  .answer.no {
    color: #2a2a2a;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    animation: sadBreath 4s ease-in-out infinite;
  }

  @keyframes partyPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  @keyframes partyColor {
    0%, 100% { color: #FFD700; }
    33% { color: #FFA500; }
    66% { color: #FFEC8B; }
  }

  @keyframes sadBreath {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(0.98); opacity: 0.4; }
  }

  .answer-sub {
    font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 1.1rem;
    margin-top: 0.8rem; line-height: 1.5; animation: fadeDown 1s ease-out 1s both;
    transition: color 1s ease, opacity 1s ease;
  }

  body.party .answer-sub { opacity: 0.9; color: #FFFDF5; }
  body.party .answer-sub .temp { font-weight: 700; color: #FFD700; }
  body.sad .answer-sub { opacity: 0.4; color: #444; }
  body.sad .answer-sub .temp { font-weight: 700; color: #555; }

  /* Divider */
  .divider {
    width: 60px; height: 1px; margin: 2rem auto;
    animation: fadeDown 1s ease-out 1.1s both; transition: background 1s ease;
  }
  body.party .divider { background: linear-gradient(90deg, transparent, #FFD700, transparent); }
  body.sad .divider { background: linear-gradient(90deg, transparent, #222, transparent); }

  /* Weather detail */
  .weather-detail {
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    font-size: 0.9rem; font-weight: 300; animation: fadeDown 1s ease-out 1.2s both;
    transition: opacity 1s ease;
  }
  body.party .weather-detail { opacity: 0.6; }
  body.sad .weather-detail { opacity: 0.25; }

  .weather-detail .dot { width: 4px; height: 4px; border-radius: 50%; transition: background 1s ease; }
  body.party .weather-detail .dot { background: #FFD700; }
  body.sad .weather-detail .dot { background: #333; }

  /* Extra messages */
  .mood-msg {
    margin-top: 1.5rem; font-size: 1rem;
    animation: fadeDown 1s ease-out 1.4s both;
    transition: color 1s ease, opacity 1s ease;
  }
  body.party .mood-msg { color: #FFD700; opacity: 0.85; font-weight: 500; }
  body.sad .mood-msg { color: #333; opacity: 0.4; font-style: italic; font-weight: 300; }

  /* Glow ring */
  .glow-ring {
    position: absolute; width: 350px; height: 350px; border-radius: 50%;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none; opacity: 0; transition: opacity 1.5s ease;
    background: radial-gradient(circle, rgba(255, 215, 0, 0.12) 0%, transparent 70%);
    z-index: -1;
  }
  body.party .glow-ring { opacity: 1; animation: glowPulse 3s ease-in-out infinite; }

  @keyframes glowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    50% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
  }

  /* Loading */
  .loading .answer {
    color: rgba(255, 253, 245, 0.15) !important;
    text-shadow: none !important;
    animation: pulse 2s ease-in-out infinite !important;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  .error-msg { font-size: 0.9rem; color: #D4A843; opacity: 0.6; margin-top: 0.5rem; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .container { padding: 1.5rem; }
    .beer-icon { height: 130px; }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="bg-party"></div>
  <div class="bg-sad"></div>
</div>

<div class="bubbles" id="bubbles"></div>
<div class="rain" id="rain"></div>
<div class="confetti-container" id="confetti"></div>

<div class="container">
  <h1 class="question">Er det <em>blanc</em> vejr?</h1>

  <img class="beer-icon" src="blanc-draft.png" alt="" />

  <div class="answer-wrapper loading" id="answerWrapper">
    <div class="glow-ring"></div>
    <div class="answer" id="answer">...</div>
    <p class="answer-sub" id="answerSub">Finder dit vejr…</p>
  </div>

  <div class="mood-msg" id="moodMsg"></div>

  <div class="divider"></div>

  <div class="weather-detail" id="weatherDetail">
    <span id="locationText">Henter lokation…</span>
  </div>
</div>

<script>
  // ===== BUBBLES =====
  (function() {
    const c = document.getElementById('bubbles');
    for (let i = 0; i < 22; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const s = Math.random() * 20 + 5;
      b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*12}s;`;
      c.appendChild(b);
    }
  })();

  // ===== RAIN =====
  (function() {
    const c = document.getElementById('rain');
    for (let i = 0; i < 100; i++) {
      const d = document.createElement('div');
      d.className = 'raindrop';
      d.style.cssText = `left:${Math.random()*100}%;height:${Math.random()*25+8}px;animation-duration:${Math.random()*0.8+0.4}s;animation-delay:${Math.random()*4}s;`;
      c.appendChild(d);
    }
  })();

  // ===== CONFETTI =====
  function createConfetti() {
    const c = document.getElementById('confetti');
    c.innerHTML = '';
    const colors = ['#FFD700','#FF6B35','#FF1493','#00BFFF','#7FFF00','#FF4500','#FFF','#FFA500','#ADFF2F'];
    for (let i = 0; i < 70; i++) {
      const p = document.createElement('div');
      p.className = 'confetti';
      const w = Math.random() * 10 + 4;
      const h = Math.random() * 14 + 4;
      p.style.cssText = `left:${Math.random()*100}%;width:${w}px;height:${h}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${Math.random()*5+3}s;animation-delay:${Math.random()*6}s;opacity:0.9;`;
      c.appendChild(p);
    }
  }

  // ===== FLOATING EMOJIS =====
  let emojiTimer;
  const partyEmojis = ['🍺','🎉','🥳','☀️','🍻','🎊','🔥','💛','🌞','🥂','🎶','💃','🕺'];

  function startEmojis() {
    stopEmojis();
    emojiTimer = setInterval(() => {
      const e = document.createElement('div');
      e.className = 'emoji-float';
      e.textContent = partyEmojis[Math.floor(Math.random() * partyEmojis.length)];
      e.style.cssText = `left:${Math.random()*85+5}%;bottom:8%;font-size:${Math.random()*1.5+1.5}rem;`;
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 4500);
    }, 500);
  }

  function stopEmojis() {
    if (emojiTimer) { clearInterval(emojiTimer); emojiTimer = null; }
    document.querySelectorAll('.emoji-float').forEach(e => e.remove());
  }

  // ===== MESSAGES =====
  const partyMsgs = [
    'SÅ SKAL DER SAFTES! 🍺🍺🍺'
  ];

  const sadMsgs = [
    'Måske en varm kakao i stedet… ☕',
    'Blanc-vejret kommer en dag…',
    'Tålmodighed… sommeren venter.',
    'Hold ud. Solen vender tilbage.',
    'Selv Blanc\'en fryser derude…',
    'Bliv under dynen. Det er ikke i dag.'
  ];

  // ===== CORE =====
  const THRESHOLD = 20;
  const answerEl = document.getElementById('answer');
  const answerSub = document.getElementById('answerSub');
  const answerWrapper = document.getElementById('answerWrapper');
  const weatherDetail = document.getElementById('weatherDetail');
  const moodMsg = document.getElementById('moodMsg');

  function showResult(temp, city) {
    answerWrapper.classList.remove('loading');
    const roundTemp = Math.round(temp * 10) / 10;
    const isParty = temp >= THRESHOLD;

    document.body.className = isParty ? 'party' : 'sad';

    if (isParty) {
      createConfetti();
      startEmojis();
      answerEl.textContent = 'JA!';
      answerEl.className = 'answer yes';
      answerSub.innerHTML = `Det er <span class="temp">${roundTemp}°C</span> — perfekt Blanc-vejr! 🌞🍺`;
      moodMsg.textContent = partyMsgs[Math.floor(Math.random() * partyMsgs.length)];
      weatherDetail.innerHTML = `<span>${city}</span><span class="dot"></span><span>${roundTemp}°C</span><span class="dot"></span><span>Skål!</span>`;
    } else {
      stopEmojis();
      document.getElementById('confetti').innerHTML = '';
      answerEl.textContent = 'NEJ';
      answerEl.className = 'answer no';
      const diff = Math.round((THRESHOLD - temp) * 10) / 10;
      answerSub.innerHTML = `Det er kun <span class="temp">${roundTemp}°C</span> — vent med din Blanc… 😔`;
      moodMsg.textContent = sadMsgs[Math.floor(Math.random() * sadMsgs.length)];
      weatherDetail.innerHTML = `<span>${city}</span><span class="dot"></span><span>${roundTemp}°C</span><span class="dot"></span><span>${diff}° for lidt</span>`;
    }
  }

  function showError(msg) {
    answerWrapper.classList.remove('loading');
    answerEl.textContent = '?';
    answerEl.className = 'answer';
    answerSub.innerHTML = `<span class="error-msg">${msg}</span><br><button onclick="startWeather()" style="margin-top:1rem;padding:0.5rem 1.5rem;border:1px solid rgba(212,168,67,0.4);background:transparent;color:#D4A843;border-radius:4px;cursor:pointer;font-family:inherit;font-size:0.85rem;">Prøv igen</button>`;
  }

  // ===== WEATHER APIs =====
  async function fetchFromOpenMeteo(lat, lon) {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m&timezone=auto`);
    if (!res.ok) throw new Error('fail');
    const d = await res.json();
    return { temp: d.current.temperature_2m };
  }

  async function fetchFromWttr(q) {
    const res = await fetch(`https://wttr.in/${encodeURIComponent(q||'')}?format=j1`);
    if (!res.ok) throw new Error('fail');
    const d = JSON.parse(await res.text());
    return { temp: parseFloat(d.current_condition[0].temp_C), city: d.nearest_area?.[0]?.areaName?.[0]?.value || '' };
  }

  async function getCityName(lat, lon) {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=da`, { headers: { 'User-Agent': 'erdetblancvejr.dk' } });
      if (!res.ok) return '';
      const d = await res.json();
      return d.address?.city || d.address?.town || d.address?.village || d.address?.municipality || '';
    } catch(e) { return ''; }
  }

  function getBrowserLocation() {
    return new Promise((ok, fail) => {
      if (!('geolocation' in navigator)) return fail();
      navigator.geolocation.getCurrentPosition(ok, fail, { timeout: 10000 });
    });
  }

  async function startWeather() {
    answerWrapper.classList.add('loading');
    answerEl.textContent = '...';
    answerSub.textContent = 'Finder dit vejr…';
    weatherDetail.innerHTML = '<span>Henter lokation…</span>';
    document.body.className = '';
    stopEmojis();

    let lat, lon, city = '';
    try {
      const p = await getBrowserLocation();
      lat = p.coords.latitude; lon = p.coords.longitude;
    } catch(e) {
      lat = 55.6761; lon = 12.5683; city = 'København (standard)';
    }

    try {
      const r = await fetchFromOpenMeteo(lat, lon);
      if (!isNaN(r.temp)) { if (!city) city = await getCityName(lat, lon); showResult(r.temp, city || 'Din lokation'); return; }
    } catch(e) {}

    try {
      const r = await fetchFromWttr(city || '');
      if (!isNaN(r.temp)) { showResult(r.temp, r.city || city || 'Din lokation'); return; }
    } catch(e) {}

    try {
      const r = await fetchFromWttr('Copenhagen');
      if (!isNaN(r.temp)) { showResult(r.temp, 'København (standard)'); return; }
    } catch(e) {}

    showError('Kunne ikke hente vejrdata. Tjek din internetforbindelse.');
  }

  startWeather();
</script>

</body>
</html>
