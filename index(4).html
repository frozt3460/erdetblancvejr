<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Er Det Blanc Vejr?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;700&family=Anton&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    transition: background 1.5s ease, color 1.5s ease;
  }

  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; position: relative; background: #0A1628; color: #FFFDF5;
  }

  body.party { background: #0A1628; color: #FFFDF5; }
  body.sad { background: #111; color: #555; }

  /* ===== BACKGROUNDS ===== */
  .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }

  .bg-party {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255, 50, 50, 0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 200, 0, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(255, 120, 0, 0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(10, 22, 40, 1) 0%, #0A1628 100%);
    animation: bgPulse 2s ease-in-out infinite alternate;
    opacity: 0; transition: opacity 1.5s ease;
  }
  body.party .bg-party { opacity: 1; }

  .bg-sad {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(40, 40, 50, 0.4) 0%, transparent 60%), linear-gradient(180deg, #111, #0a0a0a);
    opacity: 0; transition: opacity 1.5s ease;
  }
  body.sad .bg-sad { opacity: 1; }

  @keyframes bgPulse {
    0% { filter: hue-rotate(0deg) brightness(1); }
    100% { filter: hue-rotate(20deg) brightness(1.2); }
  }

  /* ===== FIREWORKS CANVAS ===== */
  #fireworks {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    opacity: 0; transition: opacity 0.5s ease;
  }
  body.party #fireworks { opacity: 1; }

  /* ===== FLASH ===== */
  .flash {
    position: fixed; inset: 0; z-index: 20; pointer-events: none;
    background: white; opacity: 0;
  }

  @keyframes screenFlash {
    0% { opacity: 0.6; }
    100% { opacity: 0; }
  }

  /* ===== LIGHT STREAKS ===== */
  .streaks { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0; transition: opacity 1s ease; overflow: hidden; }
  body.party .streaks { opacity: 1; }

  .streak {
    position: absolute; height: 2px; border-radius: 2px;
    animation: streakMove linear infinite;
  }

  @keyframes streakMove {
    0% { transform: translateX(-100%); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateX(100vw); opacity: 0; }
  }

  /* ===== BUBBLES ===== */
  .bubbles { position: fixed; inset: 0; z-index: 0; pointer-events: none; transition: opacity 1s ease; }
  body.sad .bubbles { opacity: 0.05; }
  body.party .bubbles { opacity: 1; }

  .bubble {
    position: absolute; bottom: -20px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255, 248, 231, 0.2), rgba(212, 168, 67, 0.06));
    border: 1px solid rgba(255, 255, 255, 0.08);
    animation: rise linear infinite;
  }

  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
  }

  /* ===== RAIN ===== */
  .rain { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0; transition: opacity 1.5s ease; }
  body.sad .rain { opacity: 1; }

  .raindrop {
    position: absolute; top: -20px; width: 1.5px;
    background: linear-gradient(transparent, rgba(80, 100, 130, 0.5));
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-20px); opacity: 0; }
    10% { opacity: 0.7; }
    100% { transform: translateY(110vh); opacity: 0; }
  }

  /* ===== CONFETTI ===== */
  .confetti-container { position: fixed; inset: 0; z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; }
  body.party .confetti-container { opacity: 1; }

  .confetti { position: absolute; top: -20px; animation: confettiFall linear infinite; }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(110vh) rotate(1440deg) scale(0.3); opacity: 0; }
  }

  /* ===== FLOATING EMOJIS ===== */
  .emoji-float {
    position: fixed; z-index: 5; pointer-events: none;
    animation: emojiRise 5s ease-out forwards; opacity: 0;
  }
  body.sad .emoji-float { display: none; }

  @keyframes emojiRise {
    0% { transform: translateY(0) scale(0.3) rotate(-15deg); opacity: 0; }
    10% { opacity: 1; transform: scale(1.2) rotate(0deg); }
    80% { opacity: 0.7; }
    100% { transform: translateY(-500px) scale(1.5) rotate(20deg); opacity: 0; }
  }

  /* ===== EMOJI BURST ===== */
  .emoji-burst {
    position: fixed; z-index: 15; pointer-events: none; font-size: 2.5rem;
    animation: burst 1.5s ease-out forwards;
  }

  @keyframes burst {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
    100% { transform: scale(0.5) rotate(360deg); opacity: 0; }
  }

  /* ===== MAIN CONTENT ===== */
  .container {
    position: relative; z-index: 2; text-align: center;
    padding: 2rem; max-width: 600px; width: 100%;
  }

  .question {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1.1;
    margin-bottom: 0.3em; animation: fadeDown 1s ease-out 0.4s both;
    transition: color 1s ease, text-shadow 1s ease;
  }
  .question em { font-style: italic; transition: color 1s ease; }

  body.party .question { color: #FFFDF5; text-shadow: 0 0 40px rgba(255, 200, 0, 0.3); }
  body.party .question em { color: #FFD700; }
  body.sad .question { color: #333; text-shadow: none; }
  body.sad .question em { color: #444; }

  /* Beer image */
  .beer-icon {
    display: block; margin: 1.2rem auto; height: 180px; width: auto;
    object-fit: contain; animation: fadeDown 1s ease-out 0.6s both;
    transition: filter 1.5s ease;
  }

  body.party .beer-icon {
    filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.6)) drop-shadow(0 0 80px rgba(255, 165, 0, 0.3)) drop-shadow(0 0 120px rgba(255, 100, 0, 0.15));
    animation: fadeDown 1s ease-out 0.6s both, beerWobble 1.5s ease-in-out 2s infinite;
  }

  body.sad .beer-icon {
    filter: grayscale(1) brightness(0.25) drop-shadow(0 5px 15px rgba(0, 0, 0, 0.8));
    animation: fadeDown 1s ease-out 0.6s both, beerDroop 4s ease-in-out 2s infinite;
  }

  @keyframes beerWobble {
    0%, 100% { transform: rotate(-5deg) translateY(0); }
    25% { transform: rotate(5deg) translateY(-8px); }
    50% { transform: rotate(-3deg) translateY(0); }
    75% { transform: rotate(4deg) translateY(-5px); }
  }

  @keyframes beerDroop {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    50% { transform: rotate(10deg) translateY(8px); }
  }

  /* Answer */
  .answer-wrapper { margin: 1.5rem 0; animation: fadeDown 1s ease-out 0.8s both; position: relative; }

  .answer {
    font-family: 'Anton', sans-serif; font-weight: 400;
    font-size: clamp(6rem, 22vw, 14rem); line-height: 1;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: color 0.8s ease, text-shadow 0.8s ease;
  }

  .answer.yes {
    color: #FFD700;
    text-shadow:
      0 0 40px rgba(255, 215, 0, 0.8),
      0 0 80px rgba(255, 165, 0, 0.5),
      0 0 160px rgba(255, 100, 0, 0.3),
      0 0 240px rgba(255, 50, 0, 0.15);
    animation: partyPulse 1s ease-in-out infinite, partyColor 4s ease-in-out infinite;
  }

  .answer.no {
    color: #2a2a2a;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    animation: sadBreath 4s ease-in-out infinite;
  }

  @keyframes partyPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  @keyframes partyColor {
    0%, 100% { color: #FFD700; text-shadow: 0 0 40px rgba(255, 215, 0, 0.8), 0 0 80px rgba(255, 165, 0, 0.5), 0 0 160px rgba(255, 100, 0, 0.3); }
    25% { color: #FFA500; text-shadow: 0 0 40px rgba(255, 165, 0, 0.8), 0 0 80px rgba(255, 100, 0, 0.5), 0 0 160px rgba(255, 50, 0, 0.3); }
    50% { color: #FFEC8B; text-shadow: 0 0 40px rgba(255, 236, 139, 0.8), 0 0 80px rgba(255, 215, 0, 0.5), 0 0 160px rgba(255, 165, 0, 0.3); }
    75% { color: #FF8C00; text-shadow: 0 0 40px rgba(255, 140, 0, 0.8), 0 0 80px rgba(255, 100, 0, 0.5), 0 0 160px rgba(255, 50, 0, 0.3); }
  }

  @keyframes sadBreath {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(0.97); opacity: 0.35; }
  }

  .answer-sub {
    font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 1.1rem;
    margin-top: 0.8rem; line-height: 1.5; animation: fadeDown 1s ease-out 1s both;
    transition: color 1s ease, opacity 1s ease;
  }

  body.party .answer-sub { opacity: 0.9; color: #FFFDF5; }
  body.party .answer-sub .temp { font-weight: 700; color: #FFD700; }
  body.sad .answer-sub { opacity: 0.4; color: #444; }
  body.sad .answer-sub .temp { font-weight: 700; color: #555; }

  /* Divider */
  .divider { width: 60px; height: 1px; margin: 2rem auto; animation: fadeDown 1s ease-out 1.1s both; transition: background 1s ease; }
  body.party .divider { background: linear-gradient(90deg, transparent, #FFD700, transparent); }
  body.sad .divider { background: linear-gradient(90deg, transparent, #222, transparent); }

  /* Weather detail */
  .weather-detail { display: flex; align-items: center; justify-content: center; gap: 0.6rem; font-size: 0.9rem; font-weight: 300; animation: fadeDown 1s ease-out 1.2s both; transition: opacity 1s ease; }
  body.party .weather-detail { opacity: 0.6; }
  body.sad .weather-detail { opacity: 0.25; }
  .weather-detail .dot { width: 4px; height: 4px; border-radius: 50%; transition: background 1s ease; }
  body.party .weather-detail .dot { background: #FFD700; }
  body.sad .weather-detail .dot { background: #333; }

  /* Mood message */
  .mood-msg { margin-top: 1.5rem; font-size: 1.15rem; animation: fadeDown 1s ease-out 1.4s both; transition: color 1s ease, opacity 1s ease; }
  body.party .mood-msg { color: #FFD700; opacity: 0.9; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 215, 0, 0.4); animation: fadeDown 1s ease-out 1.4s both, moodBounce 2s ease-in-out 2s infinite; }
  body.sad .mood-msg { color: #333; opacity: 0.4; font-style: italic; font-weight: 300; }

  @keyframes moodBounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* Sick leave button */
  .sygemelding-section {
    display: none;
    margin-top: 1.5rem;
    animation: fadeDown 1s ease-out 1.6s both;
  }
  body.party .sygemelding-section { display: block; }

  .syge-btn {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 140, 0, 0.15));
    border: 2px solid rgba(255, 215, 0, 0.5);
    color: #FFD700;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.8rem 2rem;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.3s ease;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    position: relative;
    overflow: hidden;
  }

  .syge-btn:hover {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.35), rgba(255, 140, 0, 0.3));
    border-color: #FFD700;
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.3), 0 0 60px rgba(255, 140, 0, 0.15);
  }

  .syge-btn:active { transform: scale(0.97); }

  .syge-result {
    margin-top: 1.2rem;
    padding: 1.2rem 1.5rem;
    background: rgba(255, 215, 0, 0.08);
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 12px;
    color: #FFFDF5;
    font-size: 0.95rem;
    line-height: 1.6;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
    display: none;
  }

  .syge-result.visible {
    opacity: 1;
    transform: translateY(0);
    display: block;
  }

  .syge-result .syge-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #FFD700;
    opacity: 0.6;
    margin-bottom: 0.5rem;
    display: block;
  }

  .syge-copy {
    margin-top: 0.8rem;
    background: transparent;
    border: 1px solid rgba(255, 215, 0, 0.3);
    color: #FFD700;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .syge-copy:hover { background: rgba(255, 215, 0, 0.15); }

  /* Glow ring */
  .glow-ring {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none; opacity: 0; transition: opacity 1.5s ease;
    background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, rgba(255, 100, 0, 0.05) 50%, transparent 70%);
    z-index: -1;
  }
  body.party .glow-ring { opacity: 1; animation: glowPulse 2s ease-in-out infinite; }

  @keyframes glowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
  }

  /* Visit counter */
  .visit-counter {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    font-size: 0.75rem; font-weight: 300; z-index: 2; transition: color 1s ease, opacity 1s ease; opacity: 0.3;
  }
  body.party .visit-counter { color: #FFD700; }
  body.sad .visit-counter { color: #333; }

  /* Loading */
  .loading .answer { color: rgba(255, 253, 245, 0.15) !important; text-shadow: none !important; animation: pulse 2s ease-in-out infinite !important; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

  .error-msg { font-size: 0.9rem; color: #D4A843; opacity: 0.6; margin-top: 0.5rem; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 480px) {
    .container { padding: 1.5rem; }
    .beer-icon { height: 130px; }
    .answer { font-size: clamp(5rem, 20vw, 10rem); }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="bg-party"></div>
  <div class="bg-sad"></div>
</div>

<canvas id="fireworks"></canvas>
<div class="flash" id="flash"></div>
<div class="streaks" id="streaks"></div>
<div class="bubbles" id="bubbles"></div>
<div class="rain" id="rain"></div>
<div class="confetti-container" id="confetti"></div>

<div class="container">
  <h1 class="question">Er det <em>blanc</em> vejr?</h1>

  <img class="beer-icon" src="blanc-draft.png" alt="" />

  <div class="answer-wrapper loading" id="answerWrapper">
    <div class="glow-ring"></div>
    <div class="answer" id="answer">...</div>
    <p class="answer-sub" id="answerSub">Finder dit vejr…</p>
  </div>

  <div class="mood-msg" id="moodMsg"></div>

  <div class="sygemelding-section" id="sygeSection">
    <button class="syge-btn" id="sygeBtn" onclick="generateSygemelding()">🤒 Fix en sygemelding til imorgen</button>
    <div class="syge-result" id="sygeResult">
      <span class="syge-label">Send denne til din chef:</span>
      <span id="sygeText"></span>
      <br>
      <button class="syge-copy" onclick="copySygemelding()" id="copyBtn">📋 Kopiér besked</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="weather-detail" id="weatherDetail">
    <span id="locationText">Henter lokation…</span>
  </div>

  <div class="visit-counter" id="visitCounter">
    <img src="https://api.visitorbadge.io/api/visitors?path=erdetblancvejr.dk&countColor=%23FFD700&style=flat&labelStyle=none" alt="visitors" style="height:20px;opacity:0.7;" />
    <span style="margin-left:0.4rem;">besøgende har tjekket Blanc-vejret</span>
  </div>
</div>

<script>
  // ===== FIREWORKS ENGINE =====
  const fwCanvas = document.getElementById('fireworks');
  const fwCtx = fwCanvas.getContext('2d');
  let fireworksActive = false;
  let particles = [];
  let rockets = [];

  function resizeCanvas() {
    fwCanvas.width = window.innerWidth;
    fwCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  const fwColors = [
    [255, 215, 0], [255, 165, 0], [255, 69, 0], [255, 105, 180],
    [0, 191, 255], [127, 255, 0], [255, 255, 255], [255, 0, 100],
    [0, 255, 200], [255, 200, 50], [200, 100, 255], [255, 80, 80]
  ];

  class Particle {
    constructor(x, y, color, vel, size, life) {
      this.x = x; this.y = y;
      this.color = color;
      this.vx = vel.x; this.vy = vel.y;
      this.size = size;
      this.life = life;
      this.maxLife = life;
      this.gravity = 0.03;
      this.trail = [];
    }
    update() {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > 5) this.trail.shift();
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity;
      this.vx *= 0.99;
      this.life--;
    }
    draw(ctx) {
      const alpha = this.life / this.maxLife;
      // trail
      for (let i = 0; i < this.trail.length; i++) {
        const ta = (i / this.trail.length) * alpha * 0.4;
        ctx.beginPath();
        ctx.arc(this.trail[i].x, this.trail[i].y, this.size * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color[0]},${this.color[1]},${this.color[2]},${ta})`;
        ctx.fill();
      }
      // main
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.color[0]},${this.color[1]},${this.color[2]},${alpha})`;
      ctx.fill();
      // glow
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * alpha * 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.color[0]},${this.color[1]},${this.color[2]},${alpha * 0.15})`;
      ctx.fill();
    }
  }

  class Rocket {
    constructor() {
      this.x = Math.random() * fwCanvas.width;
      this.y = fwCanvas.height;
      this.targetY = Math.random() * fwCanvas.height * 0.5 + 50;
      this.vy = -(Math.random() * 4 + 6);
      this.vx = (Math.random() - 0.5) * 2;
      this.trail = [];
      this.exploded = false;
    }
    update() {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > 12) this.trail.shift();
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.04;
      if (this.vy >= -1 || this.y <= this.targetY) {
        this.explode();
        this.exploded = true;
      }
    }
    draw(ctx) {
      for (let i = 0; i < this.trail.length; i++) {
        const a = i / this.trail.length * 0.6;
        ctx.beginPath();
        ctx.arc(this.trail[i].x, this.trail[i].y, 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 220, 150, ${a})`;
        ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 200, 0.9)';
      ctx.fill();
    }
    explode() {
      const color = fwColors[Math.floor(Math.random() * fwColors.length)];
      const count = Math.floor(Math.random() * 60) + 40;
      const type = Math.random();

      for (let i = 0; i < count; i++) {
        let angle, speed;
        if (type < 0.3) {
          // ring
          angle = (Math.PI * 2 / count) * i;
          speed = Math.random() * 1.5 + 3;
        } else if (type < 0.6) {
          // sphere
          angle = Math.random() * Math.PI * 2;
          speed = Math.random() * 4 + 1;
        } else {
          // burst with trails
          angle = Math.random() * Math.PI * 2;
          speed = Math.random() * 5 + 2;
        }
        const vel = { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed };
        const size = Math.random() * 2.5 + 1;
        const life = Math.floor(Math.random() * 40 + 40);
        // slight color variation
        const c = [
          Math.min(255, color[0] + Math.floor(Math.random() * 40 - 20)),
          Math.min(255, color[1] + Math.floor(Math.random() * 40 - 20)),
          Math.min(255, color[2] + Math.floor(Math.random() * 40 - 20))
        ];
        particles.push(new Particle(this.x, this.y, c, vel, size, life));
      }
      // secondary sparkles
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2;
        particles.push(new Particle(this.x, this.y, [255, 255, 220], { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed }, 1, 25));
      }
    }
  }

  function fireworksLoop() {
    if (!fireworksActive) return;
    fwCtx.globalCompositeOperation = 'source-over';
    fwCtx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
    fwCtx.globalCompositeOperation = 'lighter';

    // spawn rockets
    if (Math.random() < 0.06) rockets.push(new Rocket());

    rockets = rockets.filter(r => !r.exploded);
    rockets.forEach(r => { r.update(); r.draw(fwCtx); });

    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.update(); p.draw(fwCtx); });

    requestAnimationFrame(fireworksLoop);
  }

  function startFireworks() {
    if (fireworksActive) return;
    fireworksActive = true;
    // initial burst - 5 rockets immediately
    for (let i = 0; i < 5; i++) {
      setTimeout(() => rockets.push(new Rocket()), i * 200);
    }
    fireworksLoop();
  }

  function stopFireworks() {
    fireworksActive = false;
    fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
    particles = [];
    rockets = [];
  }

  // ===== SCREEN FLASH =====
  function doFlash() {
    const flash = document.getElementById('flash');
    flash.style.animation = 'none';
    flash.offsetHeight;
    flash.style.animation = 'screenFlash 0.6s ease-out forwards';
  }

  // ===== BUBBLES =====
  (function() {
    const c = document.getElementById('bubbles');
    for (let i = 0; i < 25; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const s = Math.random() * 22 + 5;
      b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*10+6}s;animation-delay:${Math.random()*10}s;`;
      c.appendChild(b);
    }
  })();

  // ===== LIGHT STREAKS =====
  function createStreaks() {
    const c = document.getElementById('streaks');
    c.innerHTML = '';
    const colors = ['rgba(255,215,0,0.3)', 'rgba(255,165,0,0.2)', 'rgba(255,100,180,0.2)', 'rgba(100,200,255,0.2)', 'rgba(150,255,100,0.15)'];
    for (let i = 0; i < 12; i++) {
      const s = document.createElement('div');
      s.className = 'streak';
      const w = Math.random() * 200 + 80;
      const top = Math.random() * 100;
      s.style.cssText = `width:${w}px;top:${top}%;background:linear-gradient(90deg,transparent,${colors[Math.floor(Math.random()*colors.length)]},transparent);animation-duration:${Math.random()*4+2}s;animation-delay:${Math.random()*5}s;`;
      c.appendChild(s);
    }
  }

  // ===== RAIN =====
  (function() {
    const c = document.getElementById('rain');
    for (let i = 0; i < 120; i++) {
      const d = document.createElement('div');
      d.className = 'raindrop';
      d.style.cssText = `left:${Math.random()*100}%;height:${Math.random()*30+8}px;animation-duration:${Math.random()*0.6+0.3}s;animation-delay:${Math.random()*4}s;`;
      c.appendChild(d);
    }
  })();

  // ===== CONFETTI =====
  function createConfetti() {
    const c = document.getElementById('confetti');
    c.innerHTML = '';
    const colors = ['#FFD700','#FF6B35','#FF1493','#00BFFF','#7FFF00','#FF4500','#FFF','#FFA500','#ADFF2F','#FF69B4','#00FF7F','#FF0','#F0F'];
    for (let i = 0; i < 120; i++) {
      const p = document.createElement('div');
      p.className = 'confetti';
      const w = Math.random() * 12 + 3;
      const h = Math.random() * 16 + 3;
      p.style.cssText = `left:${Math.random()*100}%;width:${w}px;height:${h}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.4?'50%':'2px'};animation-duration:${Math.random()*4+2}s;animation-delay:${Math.random()*5}s;`;
      c.appendChild(p);
    }
  }

  // ===== FLOATING EMOJIS =====
  let emojiTimer;
  const partyEmojis = ['🍺','🎉','🥳','☀️','🍻','🎊','🔥','💛','🌞','🥂','🎶','💃','🕺','🎆','🎇','⭐','✨','🌟','💥','🏖️'];

  function startEmojis() {
    stopEmojis();
    emojiTimer = setInterval(() => {
      const e = document.createElement('div');
      e.className = 'emoji-float';
      e.textContent = partyEmojis[Math.floor(Math.random() * partyEmojis.length)];
      e.style.cssText = `left:${Math.random()*90+5}%;bottom:5%;font-size:${Math.random()*2+1.5}rem;`;
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 5500);
    }, 350);
  }

  function stopEmojis() {
    if (emojiTimer) { clearInterval(emojiTimer); emojiTimer = null; }
    document.querySelectorAll('.emoji-float').forEach(e => e.remove());
  }

  // ===== EMOJI BURST (explosion on reveal) =====
  function emojiBurst() {
    const burstEmojis = ['🍺','🎉','🥳','🍻','🎊','🔥','🥂','🎆','✨','💥'];
    for (let i = 0; i < 15; i++) {
      setTimeout(() => {
        const e = document.createElement('div');
        e.className = 'emoji-burst';
        e.textContent = burstEmojis[Math.floor(Math.random() * burstEmojis.length)];
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 200 + 80;
        e.style.left = (cx + Math.cos(angle) * dist) + 'px';
        e.style.top = (cy + Math.sin(angle) * dist) + 'px';
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 1600);
      }, i * 80);
    }
  }

  // ===== SYGEMELDING GENERATOR =====
  const sygemeldinger = [
    'Hej chef, jeg kan desværre ikke komme i morgen. Min nabo har låst sig ude, og som den eneste med reservenøgle er jeg juridisk forpligtet til at blive hjemme indtil låsesmeden kommer. Det kan tage hele dagen. 🔑',
    'Hej chef, jeg er nødt til at melde mig syg i morgen. Jeg er blevet bidt af en svane i parken, og min arm er hævet op som en ballon. Lægen siger jeg skal holde den i ro. 🦢',
    'Hej chef, kan desværre ikke komme i morgen. Min kat har spist min bilnøgle, og vi venter på at den kommer ud igen. Dyrlægen siger det kan tage 24-48 timer. 🐱',
    'Hej chef, jeg må desværre melde fra i morgen. Jeg har fået akut laktoseintolerance efter at have spist en hel ost i går aftes. Det er ikke pænt. Beklager. 🧀',
    'Hej chef, jeg kommer ikke i morgen. Jeg har forbrændt mine øjenbryn af i en grillulykke, og jeg kan ikke vise mig offentligt. Jeg håber du forstår. 🔥',
    'Hej chef, desværre syg i morgen. Jeg gik i søvne i nat og vågnede op i Malmø. Jeg har ingen ID på mig og venter på at konsulatet åbner. 🇸🇪',
    'Hej chef, jeg kan ikke komme i morgen. Min bedstemor har vundet i Bingo for tredje gang denne uge og insisterer på at jeg kører hende til Tivoli for at fejre det. Jeg kan ikke sige nej til hende. 🎰',
    'Hej chef, melder mig syg i morgen. Jeg fik et allergisk anfald af min kollegas parfume i dag, og nu ligner mit ansigt en oppustet pufferfish. Lægen siger hjemme-ro. 🐡',
    'Hej chef, kan ikke komme i morgen. Jeg har siddet fast i en hængekøje siden i går eftermiddags, og brandvæsenet kan først komme klokken 16. Det er ydmygende. 🪢',
    'Hej chef, jeg må blive hjemme i morgen. Min vaskemaskine er eksploderet og hele lejligheden er under vand. Forsikringen sender en ekspert, men først i morgen eftermiddag. 🌊'
  ];

  let lastSygeIndex = -1;

  function generateSygemelding() {
    let idx;
    do { idx = Math.floor(Math.random() * sygemeldinger.length); } while (idx === lastSygeIndex);
    lastSygeIndex = idx;

    const result = document.getElementById('sygeResult');
    const text = document.getElementById('sygeText');
    const btn = document.getElementById('copyBtn');

    text.textContent = sygemeldinger[idx];
    btn.textContent = '📋 Kopiér besked';
    result.classList.add('visible');

    // little shake on the button
    const sygeBtn = document.getElementById('sygeBtn');
    sygeBtn.style.animation = 'none';
    sygeBtn.offsetHeight;
    sygeBtn.style.animation = '';
  }

  function copySygemelding() {
    const text = document.getElementById('sygeText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      document.getElementById('copyBtn').textContent = '✅ Kopieret!';
    }).catch(() => {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      document.getElementById('copyBtn').textContent = '✅ Kopieret!';
    });
  }

  // ===== MESSAGES =====
  const partyMsgs = ['SÅ SKAL DER SAFTES! 🍺🍺🍺'];

  const sadMsgs = [
    'Måske en varm kakao i stedet… ☕',
    'Blanc-vejret kommer en dag…',
    'Tålmodighed… sommeren venter.',
    'Hold ud. Solen vender tilbage.',
    'Selv Blanc\'en fryser derude…',
    'Bliv under dynen. Det er ikke i dag.'
  ];

  // ===== CORE =====
  const THRESHOLD = 20;
  const answerEl = document.getElementById('answer');
  const answerSub = document.getElementById('answerSub');
  const answerWrapper = document.getElementById('answerWrapper');
  const weatherDetail = document.getElementById('weatherDetail');
  const moodMsg = document.getElementById('moodMsg');

  function showResult(temp, city) {
    answerWrapper.classList.remove('loading');
    const roundTemp = Math.round(temp * 10) / 10;
    const isParty = temp >= THRESHOLD;

    document.body.className = isParty ? 'party' : 'sad';

    if (isParty) {
      // THE GIANT PARTY
      doFlash();
      createConfetti();
      createStreaks();
      startEmojis();
      startFireworks();
      setTimeout(emojiBurst, 300);

      answerEl.textContent = 'JA!';
      answerEl.className = 'answer yes';
      answerSub.innerHTML = `Det er <span class="temp">${roundTemp}°C</span> — perfekt Blanc-vejr! 🌞🍺`;
      moodMsg.textContent = partyMsgs[0];
      weatherDetail.innerHTML = `<span>${city}</span><span class="dot"></span><span>${roundTemp}°C</span><span class="dot"></span><span>Skål!</span>`;
    } else {
      // THE DEPRESSION
      stopEmojis();
      stopFireworks();
      document.getElementById('confetti').innerHTML = '';
      document.getElementById('streaks').innerHTML = '';

      answerEl.textContent = 'NEJ';
      answerEl.className = 'answer no';
      const diff = Math.round((THRESHOLD - temp) * 10) / 10;
      answerSub.innerHTML = `Det er kun <span class="temp">${roundTemp}°C</span> — vent med din Blanc… 😔`;
      moodMsg.textContent = sadMsgs[Math.floor(Math.random() * sadMsgs.length)];
      weatherDetail.innerHTML = `<span>${city}</span><span class="dot"></span><span>${roundTemp}°C</span><span class="dot"></span><span>${diff}° for lidt</span>`;
    }
  }

  function showError(msg) {
    answerWrapper.classList.remove('loading');
    answerEl.textContent = '?';
    answerEl.className = 'answer';
    answerSub.innerHTML = `<span class="error-msg">${msg}</span><br><button onclick="startWeather()" style="margin-top:1rem;padding:0.5rem 1.5rem;border:1px solid rgba(212,168,67,0.4);background:transparent;color:#D4A843;border-radius:4px;cursor:pointer;font-family:inherit;font-size:0.85rem;">Prøv igen</button>`;
  }

  // ===== WEATHER APIs =====
  async function fetchFromOpenMeteo(lat, lon) {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m&timezone=auto`);
    if (!res.ok) throw new Error('fail');
    const d = await res.json();
    return { temp: d.current.temperature_2m };
  }

  async function fetchFromWttr(q) {
    const res = await fetch(`https://wttr.in/${encodeURIComponent(q||'')}?format=j1`);
    if (!res.ok) throw new Error('fail');
    const d = JSON.parse(await res.text());
    return { temp: parseFloat(d.current_condition[0].temp_C), city: d.nearest_area?.[0]?.areaName?.[0]?.value || '' };
  }

  async function startWeather() {
    answerWrapper.classList.add('loading');
    answerEl.textContent = '...';
    answerSub.textContent = 'Finder dit vejr…';
    weatherDetail.innerHTML = '<span>Henter vejr…</span>';
    document.body.className = '';
    stopEmojis();
    stopFireworks();

    const lat = 55.6761, lon = 12.5683, city = 'København';

    try {
      const r = await fetchFromOpenMeteo(lat, lon);
      if (!isNaN(r.temp)) { showResult(r.temp, city); return; }
    } catch(e) {}

    try {
      const r = await fetchFromWttr('Copenhagen');
      if (!isNaN(r.temp)) { showResult(r.temp, city); return; }
    } catch(e) {}

    showError('Kunne ikke hente vejrdata. Tjek din internetforbindelse.');
  }

  startWeather();
</script>
