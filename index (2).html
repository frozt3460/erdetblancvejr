<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Er Det Blanc Vejr?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #D4A843;
    --gold-light: #F0D78C;
    --cream: #FFF8E7;
    --navy: #0A1628;
    --navy-light: #162240;
    --blue-accent: #4A90D9;
    --white: #FFFDF5;
    --red: #C0392B;
    --green: #27AE60;
    --frost: rgba(255, 255, 255, 0.08);
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* Animated background */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg::before {
    content: '';
    position: absolute;
    width: 140%;
    height: 140%;
    top: -20%;
    left: -20%;
    background: 
      radial-gradient(ellipse at 30% 20%, rgba(74, 144, 217, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(212, 168, 67, 0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(10, 22, 40, 1) 0%, var(--navy) 100%);
    animation: bgShift 20s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(2%, -2%) scale(1.03); }
  }

  /* Bubbles */
  .bubbles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .bubble {
    position: absolute;
    bottom: -20px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255, 248, 231, 0.15), rgba(212, 168, 67, 0.05));
    border: 1px solid rgba(255, 255, 255, 0.06);
    animation: rise linear infinite;
  }

  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
  }

  /* Main content */
  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 600px;
    width: 100%;
  }

  .top-label {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 0.85rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 1rem;
    animation: fadeDown 1s ease-out 0.2s both;
  }

  .question {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    line-height: 1.1;
    margin-bottom: 0.3em;
    animation: fadeDown 1s ease-out 0.4s both;
  }

  .question em {
    font-style: italic;
    color: var(--gold);
  }

  .beer-icon {
    font-size: 4rem;
    display: block;
    margin: 1.2rem auto;
    animation: fadeDown 1s ease-out 0.6s both;
    filter: drop-shadow(0 0 20px rgba(212, 168, 67, 0.3));
  }

  /* Answer */
  .answer-wrapper {
    margin: 1.5rem 0;
    animation: fadeDown 1s ease-out 0.8s both;
  }

  .answer {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(5rem, 18vw, 10rem);
    line-height: 1;
    text-shadow: 0 0 60px currentColor;
    transition: color 0.6s ease, text-shadow 0.6s ease;
  }

  .answer.yes {
    color: var(--gold-light);
    text-shadow: 0 0 80px rgba(212, 168, 67, 0.5), 0 0 30px rgba(212, 168, 67, 0.3);
  }

  .answer.no {
    color: var(--red);
    text-shadow: 0 0 80px rgba(192, 57, 43, 0.4), 0 0 30px rgba(192, 57, 43, 0.2);
  }

  .answer-sub {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 1.05rem;
    margin-top: 0.8rem;
    opacity: 0.7;
    line-height: 1.5;
    animation: fadeDown 1s ease-out 1s both;
  }

  .answer-sub .temp {
    font-weight: 700;
    color: var(--gold);
  }

  /* Divider */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 2rem auto;
    animation: fadeDown 1s ease-out 1.1s both;
  }

  /* Weather detail */
  .weather-detail {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    font-size: 0.9rem;
    font-weight: 300;
    opacity: 0.5;
    animation: fadeDown 1s ease-out 1.2s both;
  }

  .weather-detail .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold);
  }

  /* Tagline */
  .tagline {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--gold);
    opacity: 0.35;
    letter-spacing: 0.05em;
    white-space: nowrap;
    z-index: 1;
    animation: fadeDown 1s ease-out 1.5s both;
  }

  /* Loading state */
  .loading .answer {
    color: rgba(255, 253, 245, 0.15);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  .error-msg {
    font-size: 0.9rem;
    color: var(--gold);
    opacity: 0.6;
    margin-top: 0.5rem;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Small screens */
  @media (max-width: 480px) {
    .container { padding: 1.5rem; }
    .beer-icon { font-size: 3rem; }
  }
</style>
</head>
<body>

<div class="bg"></div>

<div class="bubbles" id="bubbles"></div>

<div class="container">
  <div class="top-label">Kronenbourg 1664 Blanc</div>

  <h1 class="question">Er det <em>blanc</em> vejr?</h1>

  <span class="beer-icon">🍺</span>

  <div class="answer-wrapper loading" id="answerWrapper">
    <div class="answer" id="answer">...</div>
    <p class="answer-sub" id="answerSub">Finder dit vejr…</p>
  </div>

  <div class="divider"></div>

  <div class="weather-detail" id="weatherDetail">
    <span id="locationText">Henter lokation…</span>
  </div>
</div>

<div class="tagline">Bedst nydt i solskin ved 20°+</div>

<script>
  // Create beer bubbles
  (function createBubbles() {
    const container = document.getElementById('bubbles');
    for (let i = 0; i < 18; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = Math.random() * 18 + 6;
      b.style.width = size + 'px';
      b.style.height = size + 'px';
      b.style.left = Math.random() * 100 + '%';
      b.style.animationDuration = (Math.random() * 12 + 10) + 's';
      b.style.animationDelay = (Math.random() * 15) + 's';
      container.appendChild(b);
    }
  })();

  const THRESHOLD = 20; // °C

  const answerEl = document.getElementById('answer');
  const answerSub = document.getElementById('answerSub');
  const answerWrapper = document.getElementById('answerWrapper');
  const weatherDetail = document.getElementById('weatherDetail');
  const locationText = document.getElementById('locationText');

  function showResult(temp, city) {
    answerWrapper.classList.remove('loading');
    const isBlancVejr = temp >= THRESHOLD;

    answerEl.textContent = isBlancVejr ? 'JA!' : 'NEJ';
    answerEl.className = 'answer ' + (isBlancVejr ? 'yes' : 'no');

    const roundTemp = Math.round(temp * 10) / 10;

    if (isBlancVejr) {
      answerSub.innerHTML = `Det er <span class="temp">${roundTemp}°C</span> — perfekt Blanc-vejr! 🌞`;
    } else {
      answerSub.innerHTML = `Det er kun <span class="temp">${roundTemp}°C</span> — vent med din Blanc… ❄️`;
    }

    if (isBlancVejr) {
      weatherDetail.innerHTML = `<span>${city || 'Din lokation'}</span><span class="dot"></span><span>${roundTemp}°C</span><span class="dot"></span><span>Skål!</span>`;
    } else {
      const diff = Math.round((THRESHOLD - temp) * 10) / 10;
      weatherDetail.innerHTML = `<span>${city || 'Din lokation'}</span><span class="dot"></span><span>${roundTemp}°C</span><span class="dot"></span><span>${diff}° for lidt</span>`;
    }
  }

  function showError(msg) {
    answerWrapper.classList.remove('loading');
    answerEl.textContent = '?';
    answerEl.className = 'answer';
    answerSub.innerHTML = `<span class="error-msg">${msg}</span><br><button onclick="startWeather()" style="margin-top:1rem;padding:0.5rem 1.5rem;border:1px solid rgba(212,168,67,0.4);background:transparent;color:#D4A843;border-radius:4px;cursor:pointer;font-family:inherit;font-size:0.85rem;">Prøv igen</button>`;
  }

  // --- Strategy 1: wttr.in (IP-based geolocation, no browser permission needed) ---
  async function fetchFromWttr(cityOverride) {
    const query = cityOverride || '';
    const url = `https://wttr.in/${encodeURIComponent(query)}?format=j1`;
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('wttr.in failed');
    const data = await res.json();
    const temp = parseFloat(data.current_condition[0].temp_C);
    const city = data.nearest_area[0].areaName[0].value || '';
    return { temp, city };
  }

  // --- Strategy 2: Open-Meteo (needs lat/lon from browser geolocation) ---
  async function fetchFromOpenMeteo(lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Open-Meteo failed');
    const data = await res.json();
    const temp = data.current_weather.temperature;

    // Try reverse geocode
    let city = '';
    try {
      const geoRes = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=da`,
        { headers: { 'User-Agent': 'erdetblancvejr.dk' } }
      );
      if (geoRes.ok) {
        const geoData = await geoRes.json();
        city = geoData.address?.city || geoData.address?.town || geoData.address?.village || geoData.address?.municipality || '';
      }
    } catch (e) { /* ignore */ }

    return { temp, city };
  }

  // --- Main flow: try wttr.in first (no permissions needed), then fallback ---
  async function startWeather() {
    answerWrapper.classList.add('loading');
    answerEl.textContent = '...';
    answerSub.textContent = 'Finder dit vejr…';
    weatherDetail.innerHTML = '<span>Henter lokation…</span>';

    // Attempt 1: wttr.in with auto-detect location (by IP)
    try {
      const result = await fetchFromWttr('');
      if (!isNaN(result.temp)) {
        showResult(result.temp, result.city);
        return;
      }
    } catch (e) {
      console.log('wttr.in auto failed, trying geolocation…', e);
    }

    // Attempt 2: Browser geolocation + Open-Meteo
    if ('geolocation' in navigator) {
      try {
        const pos = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 });
        });
        const result = await fetchFromOpenMeteo(pos.coords.latitude, pos.coords.longitude);
        if (!isNaN(result.temp)) {
          showResult(result.temp, result.city);
          return;
        }
      } catch (e) {
        console.log('Geolocation + Open-Meteo failed', e);
      }
    }

    // Attempt 3: wttr.in with Copenhagen fallback
    try {
      const result = await fetchFromWttr('Copenhagen');
      if (!isNaN(result.temp)) {
        showResult(result.temp, 'København (standard)');
        return;
      }
    } catch (e) {
      console.log('wttr.in Copenhagen fallback failed', e);
    }

    // Attempt 4: Open-Meteo with Copenhagen fallback
    try {
      const result = await fetchFromOpenMeteo(55.6761, 12.5683);
      if (!isNaN(result.temp)) {
        showResult(result.temp, 'København (standard)');
        return;
      }
    } catch (e) {
      console.log('Open-Meteo Copenhagen fallback failed', e);
    }

    showError('Kunne ikke hente vejrdata. Tjek din internetforbindelse.');
  }

  // Start on load
  startWeather();
</script>

</body>
</html>
